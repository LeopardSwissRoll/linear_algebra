<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 2 — 체크포인트 | MyAcademy</title>
    <link rel="stylesheet" href="style.css">
    <script>
    MathJax = { tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']] }, svg: { fontCache: 'global' } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <style>
        .score-banner { display:none; text-align:center; padding:1.2rem 1.5rem; border-radius:12px; margin-bottom:2rem; font-size:1.3rem; font-weight:700; border:1px solid var(--border); }
        .score-banner.perfect { background:rgba(131,193,103,0.12); color:var(--positive); border-color:rgba(131,193,103,0.3); }
        .score-banner.good { background:rgba(171,107,219,0.12); color:var(--accent); border-color:rgba(171,107,219,0.3); }
        .score-banner.bad { background:rgba(252,98,85,0.1); color:var(--negative); border-color:rgba(252,98,85,0.25); }
        .btn-row { display:flex; gap:1rem; justify-content:center; margin:2rem 0; flex-wrap:wrap; }
        .btn-primary { background:var(--accent); border:none; color:#fff; padding:0.7rem 2rem; border-radius:8px; cursor:pointer; font-size:1rem; font-weight:600; font-family:inherit; transition:all 0.2s; }
        .btn-primary:hover { filter:brightness(1.15); transform:translateY(-1px); }
        .btn-secondary { background:var(--bg-surface); border:1px solid var(--border); color:var(--text-primary); padding:0.7rem 2rem; border-radius:8px; cursor:pointer; font-size:1rem; font-weight:600; font-family:inherit; transition:all 0.2s; }
        .btn-secondary:hover { background:var(--bg-card); }
        .problem-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem 1.8rem; margin-bottom:1.5rem; transition:border-color 0.3s; }
        .problem-card.correct { border-color:rgba(131,193,103,0.4); }
        .problem-card.wrong { border-color:rgba(252,98,85,0.4); }
        .problem-num { display:inline-block; background:rgba(171,107,219,0.15); color:var(--accent); font-size:0.75rem; font-weight:700; padding:0.2rem 0.7rem; border-radius:12px; margin-bottom:0.8rem; letter-spacing:0.1em; }
        .problem-title { font-size:1rem; font-weight:600; color:var(--text-primary); margin-bottom:0.6rem; }
        .problem-body { font-size:0.95rem; color:var(--text-primary); margin-bottom:1rem; line-height:1.7; }
        .problem-body .va { color:var(--vec-a); font-weight:600; }
        .problem-body .vb { color:var(--vec-b); font-weight:600; }
        .answer-row { display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; }
        .answer-row label { font-size:0.9rem; color:var(--text-secondary); font-weight:600; }
        .answer-input { background:var(--bg-deep); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); padding:0.45rem 0.6rem; font-size:1rem; font-family:var(--font-code); width:80px; outline:none; transition:border-color 0.2s; }
        .answer-input:focus { border-color:var(--accent); }
        .answer-input.correct-input { border-color:var(--positive); color:var(--positive); }
        .answer-input.wrong-input { border-color:var(--negative); color:var(--negative); }
        .result-icon { font-size:1.3rem; display:none; }
        .result-icon.show { display:inline; }
        .feedback { display:none; margin-top:1.2rem; padding-top:1rem; border-top:1px solid var(--border); }
        .feedback.show { display:block; }
        .feedback-correct { color:var(--positive); font-weight:600; font-size:0.95rem; }
        .feedback-wrong { color:var(--negative); font-weight:600; font-size:0.95rem; margin-bottom:0.8rem; }
        .feedback canvas { display:block; margin:0.8rem 0; border-radius:10px; }
        .feedback .explain-text { font-size:0.88rem; color:var(--text-secondary); line-height:1.7; margin-top:0.5rem; }
        .feedback .explain-text .val { color:var(--text-primary); font-weight:600; font-family:var(--font-code); }
        .mat-inline { display:inline-block; font-family:var(--font-code); font-size:0.92rem; border-left:2px solid var(--text-secondary); border-right:2px solid var(--text-secondary); padding:0.1rem 0.5rem; line-height:1.5; vertical-align:middle; }
    </style>
</head>
<body>
  <header class="header">
    <button class="hamburger" id="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button>

  <main class="main-content">
    <div class="content">

        <h1>체크포인트 — Phase 2</h1>
        <p class="page-desc">매번 새로운 문제. 답은 항상 정수. 틀려도 맞아도 비주얼 풀이.</p>

      </div>
    </div>

    <script>
    var PAGE_ID = "p2_06";
    var ON_THIS_PAGE = [];
    </script>
    <script src="nav.js"></script>
  </main>

  <script src="canvas-lib.js"></script>
  <script>
// ============================================================
//  유틸
// ============================================================
function randInt(lo,hi){ return Math.floor(Math.random()*(hi-lo+1))+lo; }
function randVec(lo,hi){ var v; do{v={x:randInt(lo,hi),y:randInt(lo,hi)};}while(v.x===0&&v.y===0); return v; }
function fv(v){ return '('+v.x+', '+v.y+')'; }
function fm(m){ return '<span class="mat-inline">'+m[0]+' '+m[1]+'<br>'+m[2]+' '+m[3]+'</span>'; }
function mvec(m,v){ return {x:m[0]*v.x+m[1]*v.y, y:m[2]*v.x+m[3]*v.y}; }
function mmul(a,b){ return [a[0]*b[0]+a[1]*b[2],a[0]*b[1]+a[1]*b[3],a[2]*b[0]+a[3]*b[2],a[2]*b[1]+a[3]*b[3]]; }
function mdet(m){ return m[0]*m[3]-m[1]*m[2]; }

var SPECIAL = [
    {n:'90° 회전',m:[0,-1,1,0]},{n:'180° 회전',m:[-1,0,0,-1]},{n:'270° 회전',m:[0,1,-1,0]},
    {n:'x축 반사',m:[1,0,0,-1]},{n:'y축 반사',m:[-1,0,0,1]},{n:'y=x 반사',m:[0,1,1,0]},
    {n:'x전단 k=1',m:[1,1,0,1]},{n:'x전단 k=-1',m:[1,-1,0,1]},{n:'x전단 k=2',m:[1,2,0,1]},
    {n:'y전단 k=1',m:[1,0,1,1]},{n:'y전단 k=-1',m:[1,0,-1,1]},
    {n:'X×2',m:[2,0,0,1]},{n:'Y×2',m:[1,0,0,2]}
];
function pickSpecial(){ return SPECIAL[Math.floor(Math.random()*SPECIAL.length)]; }

function drawSmallGrid(c,m,range){
    var ctx=c.ctx; range=range||4;
    for(var k=-range;k<=range;k++){
        ctx.strokeStyle=k===0?'rgba(150,150,200,0.25)':'rgba(150,150,200,0.08)';
        ctx.lineWidth=k===0?1:0.7;
        var a=c.toS(mvec(m,{x:-range,y:k})),b=c.toS(mvec(m,{x:range,y:k}));
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        a=c.toS(mvec(m,{x:k,y:-range}));b=c.toS(mvec(m,{x:k,y:range}));
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
}

// ============================================================
//  6개 생성기
// ============================================================
var generators = [];
var problems = [];

// ── 1. Mv 계산 ──
generators.push(function(){
    var m=[randInt(-3,3),randInt(-3,3),randInt(-3,3),randInt(-3,3)];
    while(m[0]===0&&m[1]===0&&m[2]===0&&m[3]===0) m=[randInt(-3,3),randInt(-3,3),randInt(-3,3),randInt(-3,3)];
    var v=randVec(-3,3), r=mvec(m,v);
    return {
        num:1, title:'행렬 × 벡터 (Mv)',
        body: fm(m)+' × <span class="va">'+fv(v)+'</span> = ?',
        fields:[{label:'x =',answer:r.x,epsilon:0},{label:'y =',answer:r.y,epsilon:0}],
        draw:function(cid){
            var c=createCanvas(cid,{width:280,height:280,unit:28});
            c.clear();c.drawGrid();
            drawSmallGrid(c,m);
            c.drawDashed({x:0,y:0},v,c.colors.vecA,2,[5,3]);
            c.drawVector(r,c.colors.vecC,'Mv');
            var ctx=c.ctx; ctx.fillStyle='#fff'; ctx.font='bold 12px "Noto Sans KR",sans-serif';
            ctx.textAlign='center'; ctx.textBaseline='top';
            ctx.fillText('('+m[0]+'·'+v.x+'+'+m[1]+'·'+v.y+', '+m[2]+'·'+v.x+'+'+m[3]+'·'+v.y+')',140,258);
        },
        explain:'x\' = '+m[0]+'×'+v.x+' + '+m[1]+'×'+v.y+' = <span class="val">'+r.x+'</span><br>y\' = '+m[2]+'×'+v.x+' + '+m[3]+'×'+v.y+' = <span class="val">'+r.y+'</span>'
    };
});

// ── 2. det 계산 ──
generators.push(function(){
    var m=[randInt(-4,4),randInt(-4,4),randInt(-4,4),randInt(-4,4)];
    var d=mdet(m);
    return {
        num:2, title:'행렬식 (Determinant)',
        body: fm(m)+' 의 det = ?',
        fields:[{label:'det =',answer:d,epsilon:0}],
        draw:function(cid){
            var c=createCanvas(cid,{width:280,height:280,unit:28});
            c.clear();c.drawGrid();
            var e1=mvec(m,{x:1,y:0}),e2=mvec(m,{x:0,y:1});
            var o=c.toS({x:0,y:0}),p1=c.toS(e1),p2=c.toS(e2),p3=c.toS(vadd(e1,e2));
            var base=d>0?'131,193,103':d<0?'252,98,85':'200,200,64';
            c.ctx.fillStyle='rgba('+base+',0.15)';c.ctx.strokeStyle='rgba('+base+',0.5)';c.ctx.lineWidth=1.5;
            c.ctx.beginPath();c.ctx.moveTo(o.x,o.y);c.ctx.lineTo(p1.x,p1.y);c.ctx.lineTo(p3.x,p3.y);c.ctx.lineTo(p2.x,p2.y);
            c.ctx.closePath();c.ctx.fill();c.ctx.stroke();
            c.drawVector(e1,c.colors.vecA,"e₁'");c.drawVector(e2,c.colors.vecB,"e₂'");
            c.ctx.fillStyle='#fff';c.ctx.font='bold 13px "Noto Sans KR",sans-serif';
            c.ctx.textAlign='center';c.ctx.textBaseline='top';
            c.ctx.fillText(m[0]+'×'+m[3]+' − '+m[1]+'×'+m[2]+' = '+d,140,258);
        },
        explain:'det = ad − bc = ('+m[0]+')('+m[3]+') − ('+m[1]+')('+m[2]+') = <span class="val">'+d+'</span><br>평행사변형의 부호 있는 넓이 = 외적의 z성분.'
    };
});

// ── 3. AB 곱셈 원소 ──
generators.push(function(){
    var a=[randInt(-3,3),randInt(-3,3),randInt(-3,3),randInt(-3,3)];
    var b=[randInt(-3,3),randInt(-3,3),randInt(-3,3),randInt(-3,3)];
    var ab=mmul(a,b);
    return {
        num:3, title:'행렬 곱셈 (AB 원소)',
        body:'A = '+fm(a)+', B = '+fm(b)+'<br>AB의 <strong>(1,1)</strong> 원소와 <strong>(2,2)</strong> 원소는?',
        fields:[{label:'(1,1) =',answer:ab[0],epsilon:0},{label:'(2,2) =',answer:ab[3],epsilon:0}],
        draw:function(cid){
            var c=createCanvas(cid,{width:280,height:280,unit:28});
            c.clear();c.drawGrid();
            drawSmallGrid(c,ab);
            var e1=mvec(ab,{x:1,y:0}),e2=mvec(ab,{x:0,y:1});
            c.drawVector(e1,c.colors.vecA,"(AB)e₁");c.drawVector(e2,c.colors.vecB,"(AB)e₂");
            c.ctx.fillStyle='#fff';c.ctx.font='bold 11px "Noto Sans KR",sans-serif';
            c.ctx.textAlign='center';c.ctx.textBaseline='top';
            c.ctx.fillText('(1,1)='+a[0]+'·'+b[0]+'+'+a[1]+'·'+b[2]+'='+ab[0],140,248);
            c.ctx.fillText('(2,2)='+a[2]+'·'+b[1]+'+'+a[3]+'·'+b[3]+'='+ab[3],140,264);
        },
        explain:'(1,1) = A의 1행 · B의 1열 = '+a[0]+'×'+b[0]+' + '+a[1]+'×'+b[2]+' = <span class="val">'+ab[0]+'</span><br>(2,2) = A의 2행 · B의 2열 = '+a[2]+'×'+b[1]+' + '+a[3]+'×'+b[3]+' = <span class="val">'+ab[3]+'</span>'
    };
});

// ── 4. 특수 회전 ──
generators.push(function(){
    var angles=[{deg:90,c:0,s:1},{deg:180,c:-1,s:0},{deg:270,c:0,s:-1}];
    var a=angles[Math.floor(Math.random()*3)];
    var v=randVec(-4,4);
    var r={x:a.c*v.x-a.s*v.y, y:a.s*v.x+a.c*v.y};
    return {
        num:4, title:'특수 각도 회전',
        body:'<span class="va">v = '+fv(v)+'</span> 를 <strong>'+a.deg+'°</strong> 회전하면?',
        fields:[{label:'x =',answer:r.x,epsilon:0},{label:'y =',answer:r.y,epsilon:0}],
        draw:function(cid){
            var c=createCanvas(cid,{width:280,height:280,unit:28});
            c.clear();c.drawGrid();
            c.drawDashed({x:0,y:0},v,c.colors.vecA,2,[5,3]);
            c.drawVector(r,c.colors.vecB,"v'");
            c.drawAngleArc(v,r,'θ');
            c.ctx.fillStyle='#fff';c.ctx.font='bold 12px "Noto Sans KR",sans-serif';
            c.ctx.textAlign='center';c.ctx.textBaseline='top';
            c.ctx.fillText(fv(v)+' →'+a.deg+'°→ '+fv(r),140,258);
        },
        explain:a.deg+'° 회전: (x,y) → '+(a.deg===90?'(−y, x)':a.deg===180?'(−x, −y)':'(y, −x)')+'<br>'+fv(v)+' → <span class="val">'+fv(r)+'</span>'
    };
});

// ── 5. 역변환 M⁻¹b ──
generators.push(function(){
    var sp; do{sp=pickSpecial();}while(Math.abs(mdet(sp.m))<0.5);
    var m=sp.m, x=randVec(-3,3), b=mvec(m,x);
    return {
        num:5, title:'역변환 (Mx = b → x = ?)',
        body: fm(m)+' · x = <span class="vb">'+fv(b)+'</span><br>x = ? <span style="color:var(--text-secondary);font-size:0.82rem;">('+sp.n+'의 역)</span>',
        fields:[{label:'x =',answer:x.x,epsilon:0},{label:'y =',answer:x.y,epsilon:0}],
        draw:function(cid){
            var c=createCanvas(cid,{width:280,height:280,unit:28});
            c.clear();c.drawGrid();
            c.drawVector(x,c.colors.vecC,'x');
            c.drawVector(b,c.colors.vecB,'b=Mx');
            c.drawDashed(x,b,'rgba(171,107,219,0.3)',1.5,[4,3]);
            c.ctx.fillStyle='#fff';c.ctx.font='bold 12px "Noto Sans KR",sans-serif';
            c.ctx.textAlign='center';c.ctx.textBaseline='top';
            c.ctx.fillText('M·'+fv(x)+' = '+fv(b)+' → x = '+fv(x),140,258);
        },
        explain:'M = '+sp.n+'. Mx = b를 풀면 x = M⁻¹b = <span class="val">'+fv(x)+'</span><br>검증: M·'+fv(x)+' = '+fv(b)+' ✓'
    };
});

// ── 6. 합성 순서 (AB)v ──
generators.push(function(){
    var spA,spB,A,B,ab,ba;
    do{
        spA=pickSpecial();spB=pickSpecial();
        A=spA.m;B=spB.m;
        ab=mmul(A,B);ba=mmul(B,A);
    }while(spA.n===spB.n||(ab[0]===ba[0]&&ab[1]===ba[1]&&ab[2]===ba[2]&&ab[3]===ba[3]));
    var v=randVec(-3,3);
    var bv=mvec(B,v), r=mvec(A,bv);
    return {
        num:6, title:'합성 (AB)v',
        body:'A = '+fm(A)+' <span style="font-size:0.8rem;color:var(--text-secondary);">('+spA.n+')</span><br>B = '+fm(B)+' <span style="font-size:0.8rem;color:var(--text-secondary);">('+spB.n+')</span><br><span class="va">v = '+fv(v)+'</span> 일 때, (AB)v = ?',
        fields:[{label:'x =',answer:r.x,epsilon:0},{label:'y =',answer:r.y,epsilon:0}],
        draw:function(cid){
            var c=createCanvas(cid,{width:280,height:280,unit:28});
            c.clear();c.drawGrid();
            c.drawDashed({x:0,y:0},v,c.colors.vecA,1.5,[4,3]);
            c.drawDashed({x:0,y:0},bv,'rgba(88,196,221,0.4)',1.5,[4,3]);
            c.drawVector(r,c.colors.vecC,'(AB)v');
            // labels
            var sv=c.toS(v),sbv=c.toS(bv);
            c.ctx.fillStyle=c.colors.vecA;c.ctx.font='11px "Noto Sans KR",sans-serif';
            c.ctx.textAlign='left';c.ctx.textBaseline='bottom';
            c.ctx.fillText('v',sv.x+4,sv.y-4);
            c.ctx.fillStyle='rgba(88,196,221,0.7)';
            c.ctx.fillText('Bv',sbv.x+4,sbv.y-4);
            c.ctx.fillStyle='#fff';c.ctx.font='bold 11px "Noto Sans KR",sans-serif';
            c.ctx.textAlign='center';c.ctx.textBaseline='top';
            c.ctx.fillText('v→Bv'+fv(bv)+'→A(Bv)='+fv(r),140,258);
        },
        explain:'1단계: Bv = '+spB.n+'·'+fv(v)+' = '+fv(bv)+'<br>2단계: A(Bv) = '+spA.n+'·'+fv(bv)+' = <span class="val">'+fv(r)+'</span><br>AB ≠ BA이므로 순서가 중요!'
    };
});

// ============================================================
//  렌더링
// ============================================================
function renderProblems(){
    var container=document.getElementById('problems');
    container.innerHTML='';
    var banner=document.getElementById('scoreBanner');
    banner.style.display='none'; banner.className='score-banner';

    problems.forEach(function(p,i){
        var fhtml='';
        for(var j=0;j<p.fields.length;j++){
            fhtml+='<label for="ans-'+i+'-'+j+'">'+p.fields[j].label+'</label>'+
                '<input type="text" class="answer-input" id="ans-'+i+'-'+j+'" autocomplete="off" inputmode="decimal">';
        }
        fhtml+='<span class="result-icon" id="icon-'+i+'"></span>';
        var card=document.createElement('div');
        card.className='problem-card'; card.id='card-'+i;
        card.innerHTML=
            '<div class="problem-num">Q'+p.num+'</div>'+
            '<div class="problem-title">'+p.title+'</div>'+
            '<div class="problem-body">'+p.body+'</div>'+
            '<div class="answer-row">'+fhtml+'</div>'+
            '<div class="feedback" id="fb-'+i+'"><div id="fb-content-'+i+'"></div></div>';
        container.appendChild(card);
    });
    if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([container]);
}

function generateAll(){
    problems=generators.map(function(g){return g();});
    renderProblems();
    var first=document.getElementById('ans-0-0');
    if(first)first.focus();
}

// ============================================================
//  채점
// ============================================================
function grade(){
    var correct=0;
    problems.forEach(function(p,i){
        var card=document.getElementById('card-'+i);
        var icon=document.getElementById('icon-'+i);
        var fb=document.getElementById('fb-'+i);
        var fbc=document.getElementById('fb-content-'+i);
        var allOk=true;
        var userVals=[];
        for(var j=0;j<p.fields.length;j++){
            var inp=document.getElementById('ans-'+i+'-'+j);
            var val=parseFloat(inp.value);
            var eps=p.fields[j].epsilon||0;
            userVals.push(val);
            inp.classList.remove('correct-input','wrong-input');
            if(isNaN(val)||Math.abs(val-p.fields[j].answer)>eps){
                allOk=false; inp.classList.add('wrong-input');
            } else {
                inp.classList.add('correct-input');
            }
        }
        card.classList.remove('correct','wrong');
        card.classList.add(allOk?'correct':'wrong');
        icon.className='result-icon show';
        icon.textContent=allOk?'\u2705':'\u274C';

        fbc.innerHTML='';
        var ansStr=p.fields.map(function(f){return f.answer;}).join(', ');
        var userStr=userVals.map(function(v){return isNaN(v)?'?':v;}).join(', ');
        if(allOk){
            correct++;
            fb.className='feedback show';
            fbc.innerHTML='<div class="feedback-correct">정답!</div>'+
                '<canvas id="cvsFb-'+i+'" width="280" height="280" style="border-radius:10px;"></canvas>'+
                '<div class="explain-text">'+p.explain+'</div>';
        } else {
            fb.className='feedback show';
            fbc.innerHTML='<div class="feedback-wrong">오답 (입력: '+userStr+', 정답: '+ansStr+')</div>'+
                '<canvas id="cvsFb-'+i+'" width="280" height="280" style="border-radius:10px;"></canvas>'+
                '<div class="explain-text">'+p.explain+'</div>';
        }
        requestAnimationFrame(function(){
            if(p.draw) p.draw('cvsFb-'+i);
            if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([fbc]);
        });
    });

    var banner=document.getElementById('scoreBanner');
    banner.style.display='block';
    var total=problems.length;
    banner.textContent=correct+' / '+total+' 점';
    banner.className='score-banner';
    if(correct===total){banner.classList.add('perfect');banner.textContent+=' — 만점!';}
    else if(correct>=total/2){banner.classList.add('good');banner.textContent+=' — 좀 더!';}
    else{banner.classList.add('bad');banner.textContent+=' — 오답노트를 꼼꼼히!';}

    for(var i=0;i<problems.length;i++){
        var c=document.getElementById('card-'+i);
        if(c.classList.contains('wrong')){c.scrollIntoView({behavior:'smooth',block:'center'});break;}
    }
}

// Enter → 다음 입력
document.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
        var a=document.activeElement;
        if(a&&a.classList.contains('answer-input')){
            var inputs=document.querySelectorAll('.answer-input');
            for(var k=0;k<inputs.length;k++){
                if(inputs[k]===a){
                    if(k<inputs.length-1) inputs[k+1].focus();
                    else grade();
                    break;
                }
            }
        }
    }
});

generateAll();
  </script>
</body>
